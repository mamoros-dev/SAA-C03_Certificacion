name: Desplegar Web de Apuntes Moderna

on:
  push:
    branches: ["main"] # Cambia a "master" si tu rama principal se llama así

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Instalar MkDocs Material
        run: pip install mkdocs-material
      - name: Compilar Sitio Web
        run: mkdocs build --site-dir _site
      - name: Subir a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4